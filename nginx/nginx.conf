events {
    worker_connections 1024;
}

http {
    # Support for WebSockets
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Pool of API servers with Sticky Sessions
    upstream waitless_api {
        ip_hash; # Ensures a user stays on the same server instance
        server api:5000;
    }

    server {
        listen 80;

        # Route API requests to the Node.js cluster
        location /api {
            proxy_pass http://waitless_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Handle Socket.io WebSockets
        location /socket.io/ {
            proxy_pass http://waitless_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Route everything else to the React Frontend
        location / {
            proxy_pass http://client:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
