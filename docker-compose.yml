services:
  # Database
  mongodb:
    image: mongo:latest
    container_name: waitless-mongodb
    volumes:
      - mongodb_data:/data/db

  # Cache & WebSocket Bridge
  redis:
    image: redis:alpine
    container_name: waitless-redis

  # Backend API Cluster (3 Instances)
  api:
    build: ./server
    deploy:
      replicas: 3
    env_file:
      - ./server/.env
    environment:
      # These override .env for internal docker networking
      MONGO_URI: mongodb://mongodb:27017/waitless
      REDIS_URL: redis://redis:6379
      PORT: 5000
    depends_on:
      - mongodb
      - redis

  # Frontend Client
  client:
    build: ./client
    depends_on:
      - api

  # Background Worker
  worker:
    build: ./server
    container_name: waitless-worker
    command: node worker.js
    env_file:
      - ./server/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/waitless
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis

  # The Traffic Cop (Nginx Load Balancer)
  nginx:
    image: nginx:stable-alpine
    container_name: waitless-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - client

volumes:
  mongodb_data:
